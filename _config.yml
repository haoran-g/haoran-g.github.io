# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Haoran Geng"
title_separator          : "-"
name                     : "Haoran Geng"
description              : "Ph.D. Candidate | Computer Architecture & Security"
url                      : "https://haoran-g.github.io"
baseurl                  : ""
repository               : "haoran-g/haoran-g.github.io"

# Author (Sidebar)
author:
  avatar           : "/images/Haoran_Geng.png"
  name             : "Haoran Geng"
  bio              : "Ph.D. Candidate in Computer Science and Engineering, University of Notre Dame"
  location         : "South Bend, IN"
  employer         : "University of Notre Dame"
  email            : "hgeng@nd.edu"

  googlescholar    : "https://scholar.google.com/citations?user=5y2ILp8AAAAJ&hl=en"
  orcid            : "https://orcid.org/0009-0005-2510-2825"
  github           : "haoran-g"
  linkedin         : "haoran-geng-b9973316a"

# Publication categories
publication_category:
  manuscripts:
    title: 'Journal Articles'
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# Comments (disabled)
comments:
  provider               :

# Analytics (disabled)
analytics:
  provider               : false

# Reading Files
include:
  - .htaccess
  - _pages
  - files

exclude:
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - node_modules
  - vendor
  - README.md

# Markdown
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  hard_wrap: false

# Collections
collections:
  publications:
    output: true
    permalink: /:collection/:path/
  teaching:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

# Permalink
permalink: /:categories/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from